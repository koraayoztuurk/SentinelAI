# nginx serves the SPA and reverse-proxies the API to the backend deployment unit,
# so the browser communicates with a single same-origin boundary (no CORS needed).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vite emits content-hashed files under /assets/, so they can be cached
    # aggressively and immutably.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Same-origin API surface: proxied to the backend (Application deployment unit).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    # SPA fallback: client-side routes resolve to index.html.
    location / {
        try_files $uri /index.html;
    }
}
