# Continuous Integration (ES-030).
#
# Realizes the Release Readiness / Release Validation stages (release-management
# §5/§8): every change validates each deployment unit independently and confirms the
# deployment artifacts (images) build. It does not push images or deploy — there is
# no registry/environment target yet (deferred).

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy strict)
        run: mypy app
      - name: Test (pytest + coverage)
        run: pytest --cov=app --cov-report=term-missing --cov-report=html
      - name: Publish coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov

  frontend:
    name: Frontend (validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Test (+ coverage)
        run: npm run test:coverage
      - name: Publish coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
      - name: Build
        run: npm run build

  images:
    name: Docker images (build)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build deployment images
        run: docker compose build
