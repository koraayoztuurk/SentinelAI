# Continuous Integration (ES-030).
#
# Realizes the Release Readiness / Release Validation stages (release-management
# §5/§8): every change validates each deployment unit independently and confirms the
# deployment artifacts (images) build. It does not push images or deploy — there is
# no registry/environment target yet (deferred).

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy strict)
        run: mypy app
      - name: Test (pytest + coverage)
        run: pytest --cov=app --cov-report=term-missing --cov-report=html
      - name: Publish coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov

  backend-live:
    name: Backend (live persistence)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sentinelai
          POSTGRES_USER: sentinelai
          POSTGRES_PASSWORD: ci_only_password
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U sentinelai -d sentinelai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      POSTGRES_DB: sentinelai
      POSTGRES_USER: sentinelai
      POSTGRES_PASSWORD: ci_only_password
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Live persistence tests (opt-in marker)
        run: pytest -m live

  backend-live-neo4j:
    name: Backend (live graph store)
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/ci_only_password
        ports:
          - "7687:7687"
        options: >-
          --health-cmd "wget -qO- http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
    env:
      NEO4J_URI: bolt://127.0.0.1:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ci_only_password
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Live graph-store tests (opt-in marker)
        run: pytest -m live_neo4j

  backend-live-qdrant:
    name: Backend (live vector store)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sentinelai
          POSTGRES_USER: sentinelai
          POSTGRES_PASSWORD: ci_only_password
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U sentinelai -d sentinelai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      qdrant:
        image: qdrant/qdrant
        ports:
          - "6333:6333"
    env:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      POSTGRES_DB: sentinelai
      POSTGRES_USER: sentinelai
      POSTGRES_PASSWORD: ci_only_password
      QDRANT_URL: http://127.0.0.1:6333
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:6333/readyz && break
            sleep 1
          done
      - name: Live vector-store tests (opt-in marker)
        run: pytest -m live_qdrant

  frontend:
    name: Frontend (validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Test (+ coverage)
        run: npm run test:coverage
      - name: Publish coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
      - name: Build
        run: npm run build

  images:
    name: Docker images (build)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build deployment images
        run: docker compose build
